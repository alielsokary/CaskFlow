name: Extract icons

# Rollout (see docs/superpowers/specs/2026-07-05-icon-extraction-design.md):
# manual dispatch only until the backfill completes, then enable the cron.
# All state (PNGs + icon_report.json) lives on the icons branch — the script
# is the single writer; there is no report on master and no rolling PR.
on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max casks this run (batch cap)"
        default: "300"
      tokens:
        description: "Specific tokens, space-separated (overrides limit)"
        default: ""
  # schedule:
  #   - cron: "0 16 * * *"   # enable after backfill (rollout phase 4)

permissions:
  contents: write

concurrency:
  group: extract-icons
  cancel-in-progress: false

jobs:
  extract:
    runs-on: macos-latest
    timeout-minutes: 360  # backfill batches (--limit 300+) are download-bound
    steps:
      - uses: actions/checkout@v4

      - name: Extract and publish icons
        env:
          GH_TOKEN: ${{ github.token }}
          TOKENS: ${{ inputs.tokens }}
          LIMIT: ${{ inputs.limit }}
        run: |
          if [ -n "$TOKENS" ]; then
            # word-splitting intended: TOKENS is space-separated; the script
            # rejects anything that isn't a known cask token.
            python3 scripts/extract_icons.py --publish --tokens $TOKENS
          else
            python3 scripts/extract_icons.py --publish --limit "$LIMIT"
          fi
