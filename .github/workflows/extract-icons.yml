name: Extract icons

# PNGs and icon_report.json share the icons branch and a single writer.
on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max casks this run (batch cap)"
        default: "300"
      tokens:
        description: "Specific tokens, space-separated (overrides limit)"
        default: ""
      retry_parked:
        description: "Retry all failed-parked tokens (overrides limit/tokens)"
        type: boolean
        default: false
  schedule:
    # Run after classification so new casks can receive both assets the same day.
    - cron: "43 15 * * *"
    # Retry failures monthly because version bumps can repair stale checksums.
    - cron: "7 3 1 * *"

permissions:
  contents: write

concurrency:
  group: extract-icons
  cancel-in-progress: false

jobs:
  extract:
    runs-on: macos-latest
    timeout-minutes: 360  # backfill batches (--limit 300+) are download-bound
    steps:
      - uses: actions/checkout@v4

      - name: Extract and publish icons
        env:
          GH_TOKEN: ${{ github.token }}
          TOKENS: ${{ inputs.tokens }}
          LIMIT: ${{ inputs.limit || '300' }}
          RETRY_PARKED: ${{ inputs.retry_parked }}
          CRON: ${{ github.event.schedule }}
        run: |
          if [ "$RETRY_PARKED" = "true" ] || [ "$CRON" = "7 3 1 * *" ]; then
            python3 scripts/extract_icons.py --publish --retry-parked
          elif [ -n "$TOKENS" ]; then
            # word-splitting intended: TOKENS is space-separated; the script
            # rejects anything that isn't a known cask token.
            python3 scripts/extract_icons.py --publish --tokens $TOKENS
          else
            python3 scripts/extract_icons.py --publish --limit "$LIMIT"
          fi
