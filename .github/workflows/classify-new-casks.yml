name: Classify new casks

on:
  schedule:
    # 13:17 UTC daily (off-peak minute — on-the-hour slots run hours late),
    # so afternoon UTC catches most of them in one run.
    - cron: "17 13 * * *"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (no PR, no commit)"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: classify-new-casks
  cancel-in-progress: false

jobs:
  classify:
    runs-on: ubuntu-latest
    env:
      DRY_RUN: ${{ inputs.dry-run || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run classification pipeline
        id: classify
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            python scripts/classify_new_casks.py --dry-run
          else
            python scripts/classify_new_casks.py
          fi
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'anthropic' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Open or update rolling PR
        id: pr
        if: env.DRY_RUN != 'true'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          # A PAT allows workflows triggered by this bot-authored PR to run.
          token: ${{ secrets.CLASSIFY_BOT_TOKEN || github.token }}
          commit-message: "chore(categories): daily classification update"
          title: "chore: Daily cask classification update"
          body-path: data/classification_report.md
          branch: bot/classify-casks
          delete-branch: false
          assignees: ${{ github.repository_owner }}
          add-paths: |
            categories.json
            data/classification_report.md
            data/homepage_metadata.json

      - name: Enable auto-merge
        if: >-
          env.DRY_RUN != 'true' &&
          steps.pr.outputs.pull-request-number != '' &&
          steps.classify.outputs.review_required != 'true'
        env:
          GH_TOKEN: ${{ secrets.CLASSIFY_BOT_TOKEN || github.token }}
          PR: ${{ steps.pr.outputs.pull-request-number }}
        run: |
          if [ "$(gh pr view "$PR" --json autoMergeRequest --jq '.autoMergeRequest != null')" != "true" ]; then
            gh pr merge --auto --squash "$PR"
          fi
