name: Release categories.json

on:
  push:
    branches: [master]
    paths:
      - categories.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute release tag
        id: tag
        run: |
          d=$(date -u +%Y.%m.%d)
          echo "tag=caskflow-v$d" >> "$GITHUB_OUTPUT"
          echo "date=$d" >> "$GITHUB_OUTPUT"

      # Stamp the tag into the asset so consumers can display the release
      # their data actually came from, without a separate GitHub API call.
      # iconTokens is the manifest of the icons branch — CaskHub skips icon
      # requests for any token not listed (they are guaranteed 404s). If the
      # trees API fails or truncates, the field is omitted and the app falls
      # back to probing, so this step must never fail the release.
      - name: Stamp release tag and icon manifest into categories.json
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/$REPO/git/trees/icons" --jq \
            'if .truncated then null else
               [.tree[].path | select(endswith(".png")) | rtrimstr(".png")]
             end' > /tmp/icon_manifest.json || echo null > /tmp/icon_manifest.json
          jq --arg tag "$TAG" --slurpfile icons /tmp/icon_manifest.json \
            '. + {releaseTag: $tag}
             + (if $icons[0] then {iconTokens: ($icons[0] | sort)} else {} end)' \
            categories.json > /tmp/stamped.json
          mv /tmp/stamped.json categories.json

      - name: Compose release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          count=$(jq -r .totalCasks categories.json)
          generated=$(jq -r .generatedDate categories.json)
          {
            echo "Daily classification update — **${count} casks**, generated ${generated}."

            pr=$(gh api "repos/$REPO/commits/${{ github.sha }}/pulls" --jq '.[0].number' || true)
            if [ -n "$pr" ]; then
              echo ""
              echo "Changes: #${pr}"
            fi

            # Diff against the previous release (still "latest" at this point)
            if curl -fsSL "https://github.com/$REPO/releases/latest/download/categories.json" -o /tmp/prev.json; then
              list_tokens() { # $1: jq key order (added|removed), $2: heading
                jq -r --slurpfile prev /tmp/prev.json "$1" categories.json > /tmp/tokens.txt
                n=$(grep -c . /tmp/tokens.txt || true)
                if [ "$n" -gt 0 ]; then
                  echo ""
                  echo "**${n} $2:**"
                  head -20 /tmp/tokens.txt | sed 's/.*/- `&`/'
                  if [ "$n" -gt 20 ]; then
                    echo "- …and $((n - 20)) more"
                  fi
                fi
              }
              list_tokens '(.tokenToCategory | keys) - ($prev[0].tokenToCategory | keys) | .[]' "new cask(s)"
              list_tokens '($prev[0].tokenToCategory | keys) - (.tokenToCategory | keys) | .[]' "removed/deprecated cask(s)"
            fi
          } > /tmp/release_notes.md

      - name: Mine cask added dates
        run: python3 scripts/mine_added_dates.py

      - name: Cut release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "CaskFlow-${{ steps.tag.outputs.date }}"
          body_path: /tmp/release_notes.md
          files: |
            categories.json
            added_dates.json
          fail_on_unmatched_files: true
          make_latest: true
